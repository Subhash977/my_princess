<!DOCTYPE html>
<html>
<head>
    <title>For My Amazing Sister ❤️</title>
    <style>
        body {
            font-family: Arial;
            background: #fff0f5;
            text-align: center;
        }
        h1 {
            color: #ff4d6d;
        }
        .gallery img {
            width: 200px;
            margin: 10px;
            border-radius: 10px;
        }
        .message {
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>For My Wonderful Sister 💖</h1>

    <div class="message">
        <p>You are not just my sister, but my best friend. Thank you for always being there for me!</p>
    </div>

    <h2>Our Memories 📸</h2>
    <div class="gallery">
        <img src="photo1.jpg" alt="Memory 1">
        <img src="photo2.jpg" alt="Memory 2">
        <img src="photo3.jpg" alt="Memory 3">
    </div>

</body>
<button onclick="showMessage()">Click for a Surprise 💝</button>

<script>
function showMessage() {
    alert("You are the best sister ever! ❤️");
}
</script>
</html>
