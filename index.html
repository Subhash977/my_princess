<!DOCTYPE html>
<html>
<head>
    <title>For My Sister 💖</title>

    <style>
        body {
            margin: 0;
            font-family: 'Arial';
            background: black;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        .screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1, p {
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        h1 { animation-delay: 1s; }
        p { animation-delay: 3s; }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 18px;
            background: #ff4d6d;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 2s forwards;
            animation-delay: 5s;
        }

        button:hover {
            background: #e63950;
        }

        video {
            display: none;
            margin-top: 20px;
            border-radius: 12px;
        }

        .ending {
            display: none;
            font-size: 24px;
            margin-top: 20px;
            animation: fadeIn 3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>

<body>

<div class="screen">

    <h1>For Someone Very Special 💖</h1>
    <p>You are not just my sister...</p>
    <p>You are my best friend, my support, my happiness.</p>

    <button onclick="startSurprise()">Tap to Begin 🎁</button>

    <video id="video" width="300" controls>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="ending" id="ending">
        I’m so lucky to have you ❤️
    </div>

</div>

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
function startSurprise() {
    const video = document.getElementById("video");
    const music = document.getElementById("bgMusic");

    video.style.display = "block";
    video.play();
    music.play();

    video.onended = function() {
        document.getElementById("ending").style.display = "block";
    };
}
</script>

</body>
</html>
